# Build the Vite dashboard and push to the gh-pages branch (GitHub project Pages).
#
# One-time setup:
#   1) Settings → Actions → General → Workflow permissions → enable "Read and write permissions"
#      (default "Read repository contents" cannot push to gh-pages).
#   2) Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#      Branch: gh-pages, folder: / (root). Save, then re-run this workflow if the branch did not exist yet.

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_API_URL: ${{ vars.PUBLIC_BRIDGE_URL }}
        run: |
          npm ci
          npm run build
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard/dist
          force_orphan: true
