# Build the Vite dashboard and publish to GitHub Pages (project site).
#
# REQUIRED (once per repo): Settings → Pages → Build and deployment → Source: "GitHub Actions".
# If Source is still "Deploy from a branch", deploy-pages returns 404 when creating the deployment.

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install and build dashboard
        working-directory: dashboard
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_API_URL: ${{ vars.PUBLIC_BRIDGE_URL }}
        run: |
          npm ci
          npm run build
          touch dist/.nojekyll
          cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Required by actions/deploy-pages (OIDC + Pages API); workflow-level permissions are not enough for some runs.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
