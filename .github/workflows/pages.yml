# Build the Vite dashboard and publish to GitHub Pages (project site).
# After the first successful run, enable Pages: Settings → Pages → Source: GitHub Actions.

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install and build dashboard
        working-directory: dashboard
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_API_URL: ${{ vars.PUBLIC_BRIDGE_URL }}
        run: |
          npm ci
          npm run build
          touch dist/.nojekyll
          cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
